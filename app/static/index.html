<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563EB">
  <meta name="description" content="NoorFamily — birthday and anniversary notifications for your family">
  <title>NoorFamily Notifications</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar" aria-label="Primary">
      <div class="sidebar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2 4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/>
        </svg>
        <span>NoorFamily</span>
      </div>
      <nav>
        <ul id="nav-list" class="nav-list" role="navigation"></ul>
      </nav>
      <div class="sidebar-footer">
        <span id="version-tag">v1.0</span>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode" type="button"></button>
      </div>
    </aside>
    <div id="sidebar-scrim" class="sidebar-scrim" aria-hidden="true"></div>

    <div>
      <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Open menu" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-brand">NoorFamily</span>
      </header>
      <main id="app" tabindex="-1"></main>
    </div>
  </div>

  <div id="toast-region" class="toast-region" role="region" aria-live="polite" aria-label="Notifications"></div>
  <script src="/app.js"></script>
</body>
</html>
